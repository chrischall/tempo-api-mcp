name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          # PAT required — GITHUB_TOKEN pushes don't trigger other workflows
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | sed 's/^v//')

          # Update src/index.ts
          sed -i "s/{ name: 'tempo-api-mcp', version: '[^']*' }/{ name: 'tempo-api-mcp', version: '$NEW_VERSION' }/" src/index.ts

          # Update .claude-plugin/plugin.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" .claude-plugin/plugin.json

          # Update .claude-plugin/marketplace.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" .claude-plugin/marketplace.json

          git add package.json src/index.ts .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --follow-tags
